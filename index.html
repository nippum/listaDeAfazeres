<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Projeto</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body class="bodyConfig">
    <main class="mainConfig">
        <div class="presentationConfig">
            <h1>Bem vindo ao projeto <span class="projectNameDrop">"Lista de Afazeres"</span></h1>
            <p class="divSpan">Primeiro, vamos configurar sua lista.</p>
        </div>
        <div class="userConfig">
            <form action="mainPage.html" method="GET">
                <div class="userName">
                    <p>Primeiro deixe-nos saber seu nome.</p>
                    <label for="userName"></label>
                    <input type="text" id="name" name="name" maxlength="25">
                </div>
                <div class="listTitle">
                    <p>Insira um título para sua lista.</p>
                    <label for="listTitle"></label>
                    <input type="text" id="title" name="title">
                </div>
                <div class="optionalDescription">
                    <p>Deseja inserir uma descrição para a sua lista?</p>
                    <textarea name="description" id="description"></textarea>
                </div>
                <button id="concludedConfig" type="submit">Concluir</button>
            </form>
        </div>
    </main>
    <footer class="footerConfig">
        <div class="projectCredit">
            <p class="credits">
                Desenvolvido por <a href="https://github.com/nippum" target="_blank">nippum</a> e 
                idealizado por <a href="https://github.com/douglasbarcellos" target="_blank">Douglas Barcellos</a>.
            </p>
        </div>
        <div class="projectRepository">
            <a href="https://github.com/nippum/listaDeAfazeres" target="_blank" title="Repositório"><img src="img/gitLogo.png" alt="logo_gitHub" class="gitHubLogo"></a>
        </div>
    </footer>
</body>
</html>
