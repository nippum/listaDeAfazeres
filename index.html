<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Projeto</title>
    <link rel="stylesheet" href="style/style.css">

</head>
<body class="bodyIndex">
    <header class="headerIndex">
        <div class="userName"><p id="yourName"></p></div>
    </header>
    <main class="mainIndex">
        <div class="itemList">
            <ul id="list">
            </ul>
        </div>
        <div class="listContent">
            <div class="titleList"><h1 id="yourTitle"></h1></div>
            <div class="descriptionList"><p id="descList"></p></div>
            <div class="formInput">
                <form>
                    <label for="itemTitle"></label>
                    <input type="text" id="itemTitle" name="itemTitle" placeholder="titulo aqui..."><br>
                    <label for="itemContent"></label>
                    <input type="text" id="itemContent" name="itemContent" placeholder="conteudo aqui...">
                </form>
            </div>
            <div class="formButton">
                <button type="button" id="buttonCreate" onclick="criarItem()">criar item</button>
            </div>
        </div>
    </main>
    <p id="consoleTeste"></p>
    <footer>
        <div class="projectCredit">
            <p>Projeto Desenvolvido por <a href="https://github.com/nippum">nippum</a> (Daniel).</p>
            <p>Projeto Idealizado por <a href="https://github.com/douglasbarcellos">Douglas Barcellos</a>.</p>
        </div>
        <div class="projectRepository">
            <p><a href="">Repositório do projeto no GitHub</a></p>
        </div>
    </footer>
    
    <script type="text/javascript" src="javascript/script.js"></script>
</body>
</html>
