<!DOCTYPE html>
<html lang="pt_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Projeto</title>
    <link rel="stylesheet" href="style/style.css">

</head>
<body class="bodyIndex">
    <header class="headerIndex">
        <div class="userName"><p id="yourName"></p></div>
    </header>
    <main class="mainIndex">
        <div class="outConsole">
            <div class="itemList">
                <ul id="list">
                </ul>
            </div>
            <div class="listContent">
                <div class="titleList"><h1 id="yourTitle"></h1></div>
                <div class="descriptionList"><p id="descList"></p></div>
                <div class="formInput">
                    <form>
                        <label for="itemTitle"></label>
                        <input type="text" id="itemTitle" name="itemTitle" placeholder="titulo aqui..."><br>
                        <label for="itemContent"></label>
                        <textarea name="itemContent" id="itemContent" placeholder="conteudo aqui..."></textarea>
                    </form>
                </div>
                <div class="formButton">
                    <button type="button" id="buttonCreate" onclick="criarItem()">criar item</button>
                </div>
            </div>
        </div>
    </main>
    
    <footer class="footerConfig">
        <div class="projectCredit">
            <p class="credits">
                Desenvolvido por <a href="https://github.com/nippum" target="_blank">nippum</a> e 
                idealizado por <a href="https://github.com/douglasbarcellos" target="_blank">Douglas Barcellos</a>.
            </p>
        </div>
        <div class="projectRepository">
            <a href="https://github.com/nippum/listaDeAfazeres" target="_blank" title="Repositório"><img src="img/gitLogo.png" alt="logo_gitHub" class="gitHubLogo"></a>
        </div>
    </footer>
    
    <script type="text/javascript" src="javascript/script.js"></script>
</body>
</html>
